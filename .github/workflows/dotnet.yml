# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-publish:
    permissions:
      id-token: write

    runs-on: ubuntu-latest
    environment: release

    defaults:
      run:
        working-directory: src

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies 
      run: dotnet restore LB.Utility.sln
    - name: Build
      run: dotnet build LB.Utility.sln --configuration release --no-restore
      
    - name: Pack
      run: dotnet pack src/LB.Utility/LB.Utility.csproj -c release --no-build -o ./nupkg

    - name: Nuget login (OIDC → temp API key)
      uses: Nuget/login@v1
      id: login
      with:
        user: ${{secrets.NUGET_USER}}

    - name: Nuget Push
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
